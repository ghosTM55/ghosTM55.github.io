<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Archery quest icon</title>
  <desc id="desc">Transparent green cyan Tabler bow icon for archery mastery.</desc>
  <defs>
    <linearGradient id="cyanGreen" x1="12%" x2="88%" y1="10%" y2="90%">
      <stop offset="0" stop-color="#69dfff"/>
      <stop offset=".5" stop-color="#00e0b8"/>
      <stop offset="1" stop-color="#d8ffee"/>
    </linearGradient>
    <filter id="halo" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.00 0 0 0 0 1.00 0 0 0 0 0.82 0 0 0 .82 0" result="cyanBlur"/>
      <feMerge>
        <feMergeNode in="cyanBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tightGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="5" result="soft"/>
      <feMerge>
        <feMergeNode in="soft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(80 80) scale(36)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#00e0b8" stroke-opacity=".34" stroke-width="4.6" filter="url(#halo)">
      <path d="M17 3h4v4"/>
      <path d="M21 3l-15 15"/>
      <path d="M3 18h3v3"/>
      <path d="M16.5 20c1.576 -1.576 2.5 -4.095 2.5 -6.5c0 -4.81 -3.69 -8.5 -8.5 -8.5c-2.415 0 -4.922 .913 -6.5 2.5l12.5 12.5"/>
    </g>
    <g stroke="#d8ffee" stroke-opacity=".72" stroke-width="2.7" filter="url(#tightGlow)">
      <path d="M17 3h4v4"/>
      <path d="M21 3l-15 15"/>
      <path d="M3 18h3v3"/>
      <path d="M16.5 20c1.576 -1.576 2.5 -4.095 2.5 -6.5c0 -4.81 -3.69 -8.5 -8.5 -8.5c-2.415 0 -4.922 .913 -6.5 2.5l12.5 12.5"/>
    </g>
    <g stroke="url(#cyanGreen)" stroke-width="2.05">
      <path d="M17 3h4v4"/>
      <path d="M21 3l-15 15"/>
      <path d="M3 18h3v3"/>
      <path d="M16.5 20c1.576 -1.576 2.5 -4.095 2.5 -6.5c0 -4.81 -3.69 -8.5 -8.5 -8.5c-2.415 0 -4.922 .913 -6.5 2.5l12.5 12.5"/>
    </g>
  </g>
</svg>
