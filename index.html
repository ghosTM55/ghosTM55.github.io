<body class="is-preload">
	<div id="wrapper">

		<section id="hero">
			<div id="bg"></div>
			<div id="overlay"></div>
			<div id="main">
				<header id="header">
					<h1>Thomas YAO</h1>
					<p>Hacker &nbsp;&bull;&nbsp; Entrepreneur &nbsp;&bull;&nbsp; Archer &nbsp;&bull;&nbsp; Gamer &nbsp;&bull;&nbsp; World Citizen</p>
				</header>
			</div>
		</section>

		<!-- future sections go here -->

	</div>
	<script>
		window.addEventListener('load', () => { document.body.classList.remove('is-preload'); });
		window.addEventListener('orientationchange', () => { document.body.scrollTop = 0; });

		(() => {
			const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789•';
			const FLIPS = 10;
			const FLIP_MS = 55;
			const CHAR_DELAY = 38;

			const bioEl = document.querySelector('#header p');
			const bioText = bioEl ? bioEl.innerText : '';

			// Pre-fill with invisible spans to preserve #header height from the start
			if (bioEl) {
				bioEl.innerHTML = Array.from(bioText).map(ch => {
					if (ch === ' ' || ch === '\u00a0') return '<span class="sf-char">&nbsp;</span>';
					if (ch === '\u2022') return '<span class="sf-char sf-fade" style="opacity:0">&nbsp;</span>';
					return '<span class="sf-char" style="opacity:0">&nbsp;</span>';
				}).join('');
			}

			function splitFlap(el) {
				Array.from(el.querySelectorAll('.sf-char')).forEach((span, i) => {
					const target = bioText[i];
					if (target === ' ' || target === '\u00a0') return;

					setTimeout(() => {
						if (target === '\u2022') {
							span.textContent = target;
							requestAnimationFrame(() => requestAnimationFrame(() => {
								span.style.opacity = '1';
							}));
							return;
						}

						let count = 0;
						span.style.opacity = '1';
						span.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];

						const iv = setInterval(() => {
							count++;
							if (count >= FLIPS) {
								clearInterval(iv);
								span.textContent = target;
							} else {
								span.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
							}
						}, FLIP_MS);
					}, i * CHAR_DELAY);
				});
			}

			document.getElementById('header').addEventListener('animationend', () => {
				splitFlap(document.querySelector('#header p'));
			}, { once: true });
		})();
	</script>
</body>
