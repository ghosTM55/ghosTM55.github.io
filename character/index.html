<!DOCTYPE HTML>
<html lang="en">
<head>
	<title>Thomas Yao // Character Console</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<meta name="description" content="An RPG-style character console for Thomas Yao, mapping attributes, origin systems, quests, and achievements." />
	<link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
	<link rel="stylesheet" href="../assets/css/fontawesome-all.min.css" />
	<link rel="stylesheet" href="../assets/css/main.css?v=nong-studio-wide-card-20260427" />
</head>
<body class="page-character is-preload">
	<div id="wrapper">
		<main id="character-app">
			<div id="slide-stage" class="slide-stage" data-active-slide="character-overview">
				<div class="crt-overlay" aria-hidden="true"></div>
				<header id="slide-nav" class="slide-nav">
					<div id="slide-titlebar" class="slide-titlebar">
						<a id="slide-home" class="slide-home" href="../index.html">
							<span class="slide-home__label">$HOME</span>
						</a>
						<div id="slide-indicator" class="slide-indicator"></div>
					</div>
					<nav id="slide-tabs" class="slide-tabs" aria-label="Slide navigation"></nav>
				</header>
				<section id="slide-screen" class="slide-screen" aria-live="polite">
					<article class="slide-panel" data-slide="character-overview">
						<div id="character-system-readout" class="character-system-readout"></div>
						<div id="character-radar" class="character-radar"></div>
						<div id="character-detail" class="character-detail"></div>
						<div id="character-actions" class="character-actions"></div>
					</article>
					<article class="slide-panel" data-slide="starting-stats">
						<div class="slide-shell slide-shell--origin">
							<div id="starting-stats-intro" class="origin-grid__intro"></div>
							<div id="starting-stats-variables" class="origin-variables"></div>
							<div id="starting-stats-detail" class="origin-detail"></div>
							<div id="starting-stats-traits" class="origin-traits"></div>
						</div>
					</article>
					<article class="slide-panel" data-slide="quests">
						<div class="slide-shell slide-shell--build">
							<div id="quest-lanes" class="quest-lanes"></div>
							<div id="quest-network" class="build-network"></div>
							<div id="quest-detail" class="build-detail"></div>
						</div>
					</article>
					<article class="slide-panel" data-slide="achievements">
						<div class="slide-shell slide-shell--signal">
							<div id="achievement-list" class="trophy-list-panel"></div>
						</div>
					</article>
				</section>
			</div>
		</main>
	</div>
	<script type="module" src="../assets/js/character-site.js?v=character-url-migration-v2-20260427"></script>
</body>
</html>
